    <style>
        /* Base Setup & Security */
        body { 
            background-color: #141414; 
            color: #e5e5e5; 
            overflow-x: hidden; 
            transition: filter 0.3s ease; 
            -webkit-user-select: text; 
            -moz-user-select: text; 
            -ms-user-select: text; 
            user-select: text; 
        }
        
        /* Allow selection only in specific areas */
        .policy-content, .policy-content *, input, textarea {

            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }

        html { scroll-behavior: smooth; }
        body, .overflow-y-auto, .hide-scroll { -webkit-overflow-scrolling: touch; }
        img { -webkit-user-drag: none; user-drag: none; pointer-events: none; }

        /* Smooth Background Freeze Lock */
        body.scroll-locked { overflow: hidden !important; }

        @media (min-width: 1024px) {
            .premium-card, .category-row, .hero-slide { 
                will-change: transform; transform: translateZ(0); backface-visibility: hidden; 
            }
        }

        /* Lenis Scroll */
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0; transition: opacity 1s ease; }

        /* Sidebar Styling - Expands on hover (With Z-Index fix to stay above content) */
        #sidebar { 
            width: 5.5rem; 
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden; 
            background-color: #141414; /* Exact solid background */
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100 !important; /* Forces Sidebar to always be on top of search bars/cards */
        }
        #sidebar:hover { 
            width: 17.5rem; /* Increased width to prevent logo text from touching the edge */
            box-shadow: 15px 0 40px rgba(0,0,0,0.9);
        }
        
        /* Navigation Labels Animation */
        .nav-label { opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; white-space: nowrap; display: none; }
        #sidebar:hover .nav-label { opacity: 1; transform: translateX(0); display: block; }
        
        /* Glitch-Free Logo Text Handling */
        .logo-text { opacity: 0; transition: opacity 0.2s ease; white-space: nowrap; pointer-events: none; }
        #sidebar:hover .logo-text { opacity: 1; transition-delay: 0.15s; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #E50914; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* New Premium Skeleton Pulse Effect */
        .skeleton-bg { background: #1c1c1c; animation: skeletonPulse 1.8s ease-in-out infinite; }
        @keyframes skeletonPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Rolling Text */
        .rolling-wrapper-inline { height: 1.1em; overflow: hidden; position: relative; display: inline-flex; vertical-align: bottom; }
        .rolling-list-inline { margin: 0; padding: 0; list-style: none; will-change: transform; display: flex; flex-direction: column; width: 100%; }
        .rolling-list-inline li { height: 1.1em; display: flex; align-items: center; white-space: nowrap; }

        /* Premium Card */
        .premium-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: linear-gradient(145deg, #1c1c1e 0%, #09090b 100%) !important; 
            border: 1px solid rgba(255, 255, 255, 0.12) !important; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05) !important; 
            display: flex !important; flex-direction: column !important; height: 100% !important; width: 100% !important; 
        }
        @media (min-width: 1024px) { 
            .premium-card:not([style*="grayscale"]):hover { 
                transform: translateY(-8px) scale(1.02) translateZ(0); 
                box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 0 0 1px rgba(229,9,20,0.5) !important; 
                border-color: rgba(229, 9, 20, 0.4) !important; z-index: 20; 
            } 
        }
        @media (max-width: 1023px) { 
            .premium-card:not([style*="grayscale"]):active { transform: scale(0.98); border-color: rgba(229, 9, 20, 0.4) !important; } 
        }

        .pinned-glow { border-color: rgba(229, 9, 20, 0.6) !important; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6), 0 0 20px rgba(229, 9, 20, 0.25), inset 0 0 15px rgba(229, 9, 20, 0.1) !important; }
        .pinned-glow:not([style*="grayscale"]):hover { border-color: rgba(229, 9, 20, 1) !important; box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px rgba(229, 9, 20, 0.4), inset 0 0 20px rgba(229, 9, 20, 0.2) !important; }

        /* Premium Smooth Image Zoom */
        .card-image-wrapper { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; border-radius: 8px 8px 0 0; flex-shrink: 0; }
        .card-image { 
            will-change: transform; transform: scale(1.01) translateZ(0); 
        }
        @media (min-width: 1024px) { 
            .premium-card:not([style*="grayscale"]):hover .card-image { transform: scale(1.06) translateZ(0); transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); } 
        }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; align-items: stretch; }
        .grid-container > * { height: 100%; }

        @media(max-width: 640px) {
            .grid-container { grid-template-columns: repeat(2, 1fr) !important; gap: 0.75rem; }
            .premium-card { font-size: 0.85rem; }

            .premium-card .gap-2 { gap: 0.3rem !important; }
            .card-image-wrapper { aspect-ratio: 16/10; }
            .card-btn-container { flex-direction: column !important; gap: 0.4rem !important; }
            .card-btn-container a, .card-btn-container button { padding: 0.5rem 0.5rem !important; font-size: 0.7rem !important; }
        }
        @media(min-width: 480px) and (max-width: 768px) { .grid-container { grid-template-columns: repeat(3, 1fr) !important; } }

        /* Shopify-Style Smooth Loader */
        #top-loader {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #E50914, #ffffff, #E50914);
            background-size: 200% 100%;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.8), 0 0 5px rgba(255, 255, 255, 0.5);
            width: 0%;
            z-index: 99999;
            opacity: 0;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            animation: loaderFlow 1s linear infinite;
            pointer-events: none;
        }
        @keyframes loaderFlow {
            0% { background-position: 100% 0; }
            100% { background-position: -200% 0; }
        }
        
        body.privacy-blur { filter: blur(15px); }

        .policy-content p { margin-bottom: 1.5rem; color: #9ca3af; line-height: 1.8; font-size: 1.05rem; }

        .policy-content li { margin-bottom: 0.75rem; line-height: 1.6; }

        .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo-text {
            font-family: 'Exo 2', sans-serif;
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(180deg, #ffffff 0%, #a0a0aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 3px 4px rgba(0, 0, 0, 0.8));
        }

        /* Announcement Popup Styles */
        @keyframes popupSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #announcement-popup {
            position: fixed; bottom: 24px; right: 24px; z-index: 9000;
            max-width: 360px; width: calc(100% - 48px);
            background: #1a1a1c; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            display: none; flex-direction: column; overflow: hidden;
        }
        #ap-img { width: 100%; height: 160px; object-fit: cover; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .ap-content { padding: 20px; }
        #ap-cat { display: inline-block; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #E50914; background: rgba(229,9,20,0.1); padding: 4px 8px; border-radius: 6px; margin-bottom: 8px; }
        #ap-title { color: white; font-size: 18px; font-weight: bold; margin: 0; line-height: 1.2; }
        #ap-desc { color: #9ca3af; font-size: 13px; margin-top: 6px; margin-bottom: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .ap-actions { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
        #ap-btn { width: 100%; background: #E50914; color: white; font-weight: bold; padding: 12px; border-radius: 12px; transition: transform 0.2s, background 0.2s; text-align: center; cursor: pointer; border: none; }
        #ap-btn:hover { background: #ff0f1b; transform: scale(1.02); }
        #ap-dismiss { color: #6b7280; background: transparent; font-size: 12px; border: none; cursor: pointer; padding: 8px; transition: color 0.2s; font-weight: 500; }
        #ap-dismiss:hover { color: white; }

        /* Smooth Scroll Overlay Styles */
        #smooth-scroll-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 99999;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #smooth-scroll-overlay.active {
            opacity: 1; pointer-events: all;
        }
        .shimmer-text {
            font-size: 2.5rem; font-weight: bold; color: rgba(255,255,255,0.2);
            background: linear-gradient(90deg, rgba(255,255,255,0.2) 0%, #ffffff 50%, rgba(255,255,255,0.2) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerSweep 1.5s infinite linear;
        }
        @keyframes shimmerSweep {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>

            if (!announcementConfig.enabled) return;

            const seenId = localStorage.getItem('forgenos_seen_announce');
            if (seenId === announcementConfig.id) return;

            setTimeout(() => {
                const popup = document.getElementById('announcement-popup');
                if (!popup) return;

                // Clean up localStorage for old forgenos_ keys to prevent bloat
                const keys = Object.keys(localStorage).filter(k => k.startsWith('forgenos_'));
                if (keys.length > 10) {
                    localStorage.removeItem(keys[0]);
                }
                localStorage.setItem('forgenos_seen_announce', announcementConfig.id);

                // Populate popup data
                document.getElementById('ap-img').src = announcementConfig.image;
                document.getElementById('ap-cat').textContent = announcementConfig.category;
                document.getElementById('ap-title').textContent = announcementConfig.title;
                document.getElementById('ap-desc').textContent = announcementConfig.description;
                document.getElementById('ap-btn').textContent = announcementConfig.buttonText;

                document.getElementById('ap-btn').onclick = () => {
                    window.open(announcementConfig.buttonLink, '_blank');
                    window.dismissPopup();
                };
                document.getElementById('ap-dismiss').onclick = window.dismissPopup;

                // Show popup with animation
                popup.style.display = 'flex';
                void popup.offsetWidth; // Force reflow
                popup.style.animation = 'popupSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                window.lockScroll();

            }, announcementConfig.delaySeconds * 1000);

        window.handleNavClick = function(view, isPopState=false) {
            if(currentView === view && view !== 'projects' && view !== 'home') return;
            
            if(!isPopState) history.pushState({view: view}, '', '#'+view);
            
            const footer = document.getElementById('main-footer');
            if(footer) footer.style.display = (view === 'home') ? 'block' : 'none';
            
            window.triggerPageLoader();
            currentView = view;
            window.renderSidebar();
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            if(heroInterval) { clearInterval(heroInterval); heroInterval = null; }
            if(heroTextInterval) { clearInterval(heroTextInterval); heroTextInterval = null; }
            
            const container = document.getElementById('view-content');
            
            if(typeof gsap !== 'undefined') {
                gsap.to(container, {
                    opacity: 0, y: 20, duration: 0.2, 
                    onComplete: () => {
                        if(view === 'home') window.renderHome();
                        else if(view === 'settings') window.renderSettings();
                        else if(view === 'saved') window.renderSavedView();
                        else if(view === 'projects') window.renderProjectsView();
                        else if(['privacy','terms','about','contact','disclaimer'].includes(view)) window.renderPolicyPage(view);
                        else if(view.startsWith('tool-')) window.renderToolDetailPage(parseInt(view.split('-')[1]));
                        else window.renderCategoryPage(view);
                        
                        container.style.opacity = '1';
                        gsap.to(container, { y: 0, duration: 0.4 });
                        
                        const cards = document.querySelectorAll('.premium-card, .animate-fade-up');
                        cards.forEach((c, i) => {
                            c.style.opacity = '0';
                            c.style.animationDelay = `${i * 0.03}s`;
                            c.classList.add('animate-fade-up');
                        });
                    }
                });
            } else {
                if(view === 'home') window.renderHome();
                else if(view === 'settings') window.renderSettings();
                else if(view === 'saved') window.renderSavedView();
                else if(view === 'projects') window.renderProjectsView();
                else if(['privacy','terms','about','contact','disclaimer'].includes(view)) window.renderPolicyPage(view);
                else if(view.startsWith('tool-')) window.renderToolDetailPage(parseInt(view.split('-')[1]));
                else window.renderCategoryPage(view);
                
                container.style.opacity = '1'; 
                container.style.transform = 'translateY(0)';

        window.performInlineSearch = function() {
            const input = document.getElementById('inline-search-input');
            const clearBtn = document.getElementById('inline-search-clear');
            const resultsArea = document.getElementById('search-results-area');
            const resultsGrid = document.getElementById('search-results-grid');
            const emptyState = document.getElementById('search-results-empty');
            const mainContent = document.getElementById('home-main-content');
            const countText = document.getElementById('search-results-count');
            
            if(!input || !resultsArea) return;
            const query = input.value.toLowerCase().trim();
            
            if (query.length > 0) {
                clearBtn.style.display = 'block';
                resultsArea.classList.remove('hidden');
                if(mainContent) mainContent.classList.add('hidden'); 
                
                const filtered = toolsData.filter(t => t.title.toLowerCase().includes(query) || t.desc.toLowerCase().includes(query) || t.category.toLowerCase().includes(query) || t.tags.some(tag => tag.toLowerCase().includes(query)));
                countText.innerText = `${filtered.length} found`;

                if(filtered.length === 0) {
                    resultsGrid.innerHTML = ''; emptyState.style.display = 'flex'; emptyState.classList.remove('hidden');
                } else {
                    emptyState.style.display = 'none'; emptyState.classList.add('hidden');
                    resultsGrid.innerHTML = filtered.map((t) => `<div>${window.createCard(t)}</div>`).join('');
                    window.tryCreateIcons();
                }
            } else { window.closeInlineSearch(); }
        };

        window.togglePin = function(event, id) {
            if(event){ event.preventDefault(); event.stopPropagation(); }
            if(pinnedTools.includes(id)){
                pinnedTools = pinnedTools.filter(i => i !== id);
                window.showToast("Tool Unpinned", 'alert');
            } else {
                if(pinnedTools.length >= 5){ window.showToast("You can only pin up to 5 tools!", 'alert'); return; }
                pinnedTools.push(id);
                window.showToast("Tool Pinned!", 'success');
            }
            localStorage.setItem('toolnox_pinned', JSON.stringify(pinnedTools));
            if(currentView === 'home') window.renderHome(); else window.updateCardButtons(id);
        };

        window.toggleSave = function(event, id) {

            if(savedTools.includes(id)){
                savedTools = savedTools.filter(i => i !== id);
                window.showToast("Removed from My List", 'alert');
            } else {
                savedTools.push(id);
                window.showToast("Added to My List", 'success');
            }
            localStorage.setItem('toolnox_saved', JSON.stringify(savedTools));
            if(currentView === 'saved') window.renderSavedView(); else window.updateCardButtons(id);
        };

                if(icon){
                    if(pinnedTools.includes(id)){ icon.classList.add('fill-brand-accent','text-brand-accent'); icon.classList.remove('text-white'); }
                    else { icon.classList.remove('fill-brand-accent','text-brand-accent'); icon.classList.add('text-white'); }
                }
            });
            const saveBtns = document.querySelectorAll(`[data-save-btn="${id}"]`);
            saveBtns.forEach(btn => {
                const icon = btn.querySelector('svg') || btn.querySelector('i');
                if(icon){
                    if(savedTools.includes(id)){ icon.classList.add('fill-brand-accent','text-brand-accent'); icon.classList.remove('text-white'); }
                    else { icon.classList.remove('fill-brand-accent','text-brand-accent'); icon.classList.add('text-white'); }
                }
            });
        };

            else if(tool.category === 'dev') categoryColor = "text-blue-500 border-blue-500/20 bg-blue-500/5";

            const tool = toolsData.find(t => t.id === id); if (tool && tool.disabled) return;
            if(selectedToolsForProject.includes(id)) selectedToolsForProject = selectedToolsForProject.filter(tid => tid !== id); 
            else selectedToolsForProject.push(id);
            window.filterModalTools(); window.updateSelectedToolsList();
        };

        window.updateSelectedToolsList = function() {
            document.getElementById('selected-count').innerText = selectedToolsForProject.length;
            const list = document.getElementById('selected-tools-list');
            if(selectedToolsForProject.length === 0) { 
                list.innerHTML = '<p class="text-gray-700 text-xs italic text-center py-6">Tap tools in the grid to add them.</p>'; 
            } else { 
                const selected = toolsData.filter(t => selectedToolsForProject.includes(t.id)); 
                list.innerHTML = selected.map(t => `<div class="flex items-center gap-3 bg-black p-3 rounded-xl border border-white/5 animate-fade-up shrink-0"><span class="text-xs font-bold text-white truncate flex-1">${t.title}</span><button onclick="window.toggleToolSelection(${t.id})" class="text-gray-500 hover:text-red-500"><i data-lucide="x" class="w-3 h-3"></i></button></div>`).join(''); 
            }
            window.tryCreateIcons();
        };

        window.saveProject = function() {
            const name = document.getElementById('project-name-input').value.trim();
            if(!name) { window.showToast("Please enter a name", "alert"); return; }
            if(selectedToolsForProject.length === 0) { window.showToast("Please select tools", "alert"); return; }
            myProjects.push({ id: Date.now(), name, toolIds: [...selectedToolsForProject] });
            localStorage.setItem('toolnox_projects', JSON.stringify(myProjects));
            window.closeProjectModal(); window.handleNavClick('projects'); window.showToast("Toolkit Created!", 'success');
        };

        window.triggerDeleteProject = function(event, id) {
            if(event) { event.stopPropagation(); }
            projectToDeleteId = id; 
            const modal = document.getElementById('delete-modal'); 
            modal.classList.remove('hidden');
            if(typeof gsap !== 'undefined') gsap.to(document.getElementById('delete-modal-content'), { scale: 1, opacity: 1, duration: 0.3 });
            
            document.getElementById('confirm-delete-btn').onclick = () => {
                myProjects = myProjects.filter(p => p.id !== projectToDeleteId); 
                localStorage.setItem('toolnox_projects', JSON.stringify(myProjects));
                window.closeDeleteModal(); 
                if(currentOpenProjectId === projectToDeleteId) { window.closeInnerProject(); } 
                window.renderProjectsView(); window.showToast("Toolkit Deleted", 'alert');
            };
        };

        window.closeDeleteModal = function() { 
            const modal = document.getElementById('delete-modal'); 
            if(typeof gsap !== 'undefined') { gsap.to(document.getElementById('delete-modal-content'), { scale: 0.9, opacity: 0, duration: 0.2, onComplete: () => { modal.classList.add('hidden'); projectToDeleteId = null; }}); } 
            else { modal.classList.add('hidden'); projectToDeleteId = null; } 
        };

        window.resetStorage = function(type) {
            if (confirm("Are you sure? This cannot be undone.")) {
                if (type === 'saved') { savedTools = []; localStorage.removeItem('toolnox_saved'); } 
                else { myProjects = []; localStorage.removeItem('toolnox_projects'); }
                window.renderSettings(); window.showToast("Data Wiped", "alert");
            }
        };

        window.initParticles = function() {
            const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let stars = []; let meteors = [];

            class Star {
                constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.0; this.alpha = Math.random() * 0.3; this.alphaChange = (Math.random() * 0.01) - 0.005; }
                draw() { this.alpha += this.alphaChange; if(this.alpha <= 0.05 || this.alpha >= 0.4) this.alphaChange *= -1; ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
            }

            class Meteor {
                constructor() { this.reset(); }
                reset() { if (Math.random() > 0.5) { this.x = Math.random() * canvas.width; this.y = -100; } else { this.x = -100; this.y = Math.random() * canvas.height; } this.length = Math.random() * 120 + 80; this.speed = Math.random() * 6 + 4; this.angle = Math.PI / 8; this.active = false; this.timer = Math.random() * 800 + 300; this.opacity = 0; this.fadeIn = true; }
                update() {
                    if(!this.active) { this.timer--; if(this.timer <= 0) this.active = true; return; }
                    this.x += this.speed * Math.cos(this.angle); this.y += this.speed * Math.sin(this.angle);
                    if (this.fadeIn) { this.opacity += 0.005; if (this.opacity >= 0.7) this.fadeIn = false; } else { this.opacity -= 0.003; }
                    if(this.x > canvas.width + 200 || this.y > canvas.height + 200 || (!this.fadeIn && this.opacity <= 0)) { this.reset(); }
                }
                draw() {
                    if(!this.active || this.opacity <= 0) return;
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                    let gradient = ctx.createLinearGradient(0, 0, -this.length, 0); gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`); gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-this.length, 0); ctx.strokeStyle = gradient; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
                }
            }

            for(let i=0; i<50; i++) stars.push(new Star()); for(let i=0; i<3; i++) meteors.push(new Meteor()); 

            function animate() { if(!appSettings.interactiveBg) return; ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s => s.draw()); meteors.forEach(m => { m.update(); m.draw(); }); requestAnimationFrame(animate); }
            animate();
        };
        
        // --- INIT ---
        window.onload = () => {
            const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 1024;
            
            // FIX: Check URL Hash to load correct category/page instead of forcing home
            let initialView = 'home';
            if (window.location.hash) {
                const hashView = window.location.hash.substring(1);
                const validViews = ['home', 'projects', 'trending', 'finance', 'dev', 'student', 'brain', 'health', 'pdf', 'image', 'saved', 'settings', 'about', 'contact', 'privacy', 'terms', 'disclaimer'];
                if (validViews.includes(hashView) || hashView.startsWith('tool-')) {
                    initialView = hashView;
                }
            }

            history.replaceState({view: initialView}, '', '#' + initialView);
            currentView = initialView;
            
            // Initialize Lenis ONLY if Smooth Scroll is toggled ON and user is on a Desktop (width >= 1024px)
            if(typeof Lenis !== 'undefined' && appSettings.smoothScroll && !isMobileDevice) {
                lenisInstance = new Lenis({duration:1.2, easing:(t)=>Math.min(1,1.001-Math.pow(2,-10*t)), orientation:'vertical', smoothWheel:true });
                if(typeof ScrollTrigger !== 'undefined') lenisInstance.on('scroll', ScrollTrigger.update);
                if(typeof gsap !== 'undefined') { gsap.ticker.add((time)=>{lenisInstance.raf(time*1000)}); gsap.ticker.lagSmoothing(0); }
            }
            
            window.triggerPageLoader(); 
            window.applyImmediateSettings(); 
            
            // FIX: Render the specific view requested in URL
            if(initialView === 'home') window.renderHome();
            else if(initialView === 'settings') window.renderSettings();
            else if(initialView === 'saved') window.renderSavedView();
            else if(initialView === 'projects') window.renderProjectsView();
            else if(['privacy','terms','about','contact','disclaimer'].includes(initialView)) window.renderPolicyPage(initialView);
            else if(initialView.startsWith('tool-')) window.renderToolDetailPage(parseInt(initialView.split('-')[1]));
            else window.renderCategoryPage(initialView);

            // Set footer visibility appropriately
            const footer = document.getElementById('main-footer');
            if(footer) footer.style.display = (initialView === 'home') ? 'block' : 'none';

            window.renderSidebar(); 
            window.tryCreateIcons();

            // Trigger announcement popup logic if enabled
            window.checkAndShowAnnouncement();
        };

        window.addEventListener('resize', () => { if(appSettings.interactiveBg) window.initParticles(); });
    </script>
</body>
</html>
