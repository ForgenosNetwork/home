<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGENOS | Coming Soon</title>
    
    <!-- Premium Sans-serif Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --brand-red: rgba(180, 15, 15, 0.45);
            --brand-white: rgba(255, 255, 255, 0.15);
            --text-main: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
            perspective: 1000px;
        }

        /* --- Noise Texture Overlay --- */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- Smooth Mesh/Smoke Background --- */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: 0;
            filter: blur(90px); /* Heavy blur creates the smoke/mesh merging effect */
            -webkit-filter: blur(90px);
            transform: translateZ(0); /* Hardware acceleration */
        }

        .blob-wrapper {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: drift alternate infinite ease-in-out;
        }

        .blob-red {
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, var(--brand-red) 0%, transparent 60%);
            top: -20%; left: -10%;
            animation-duration: 25s;
        }

        .blob-white {
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, var(--brand-white) 0%, transparent 60%);
            bottom: -20%; right: -10%;
            animation-duration: 28s;
            animation-delay: -5s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(12vw, 15vh) scale(1.1); }
            66% { transform: translate(-8vw, 8vh) scale(0.95); }
            100% { transform: translate(5vw, -12vh) scale(1.05); }
        }

        /* --- Glassmorphism Container --- */
        .glass-card-wrapper {
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 5rem 6rem;
            text-align: center;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4), 
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
        }

        /* --- Typography & Animations --- */
        .title-wrapper {
            transform: translateZ(40px); /* 3D pop effect */
        }

        .title {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            color: var(--text-main); /* Clean, solid premium text */
        }

        .separator {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            margin: 0 auto 2.5rem auto;
            transform: translateZ(30px);
        }

        .subtext-wrapper {
            transform: translateZ(20px);
        }

        .subtext {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .date {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.25em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            margin-top: 1.5rem;
        }

        /* --- Responsive Design --- */
        @media (max-width: 900px) {
            .glass-card {
                padding: 4rem 3rem;
            }
            .title {
                font-size: 4rem;
            }
            .blob-red { width: 100vw; height: 100vw; }
            .blob-white { width: 90vw; height: 90vw; }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 3rem 1.5rem;
                border-radius: 20px;
            }
            .title {
                font-size: 2.8rem;
            }
            .subtext {
                font-size: 0.65rem;
                letter-spacing: 0.2em;
            }
            .date {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- Grain/Noise Texture -->
    <div class="noise-overlay"></div>

    <!-- Smoke / Mesh Gradient Background -->
    <div class="bg-container">
        <div class="blob-wrapper" id="blob-red-wrapper">
            <div class="blob blob-red"></div>
        </div>
        <div class="blob-wrapper" id="blob-white-wrapper">
            <div class="blob blob-white"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="glass-card-wrapper">
        <div class="glass-card" id="card">
            <div class="title-wrapper">
                <h1 class="title">FORGENOS</h1>
            </div>
            
            <div class="separator"></div>
            
            <div class="subtext-wrapper">
                <p class="subtext">Initializing Protocol...</p>
                <p class="subtext date">Coming Soon: 26 March 2026</p>
            </div>
        </div>
    </div>

    <!-- Interactive Scripts -->
    <script>
        const card = document.getElementById('card');
        const blobRedWrapper = document.getElementById('blob-red-wrapper');
        const blobWhiteWrapper = document.getElementById('blob-white-wrapper');
        
        // Security: Right-click disable karna
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Security: DevTools aur View Source shortcut keys disable karna (F12, Ctrl+Shift+I, Ctrl+U, etc.)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) ||
                (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
                e.preventDefault();
            }
        });

        // Disable 3D tilt on touch devices for performance and better UX
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        if (!isTouchDevice) {
            document.addEventListener('mousemove', (e) => {
                // Calculate mouse position relative to center of screen
                const xAxis = (window.innerWidth / 2 - e.pageX) / 60;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 60;
                
                // Apply 3D tilt to the glass card
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                
                // Subtle Parallax effect on the background "smoke" blobs
                blobRedWrapper.style.transform = `translate(${xAxis * -2}px, ${yAxis * -2}px)`;
                blobWhiteWrapper.style.transform = `translate(${xAxis * 3}px, ${yAxis * 3}px)`;
            });

            // Reset transformations smoothly when mouse leaves the window
            document.addEventListener('mouseleave', () => {
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                blobRedWrapper.style.transform = `translate(0px, 0px)`;
                blobWhiteWrapper.style.transform = `translate(0px, 0px)`;
            });
        }
    </script>

</body>
</html>
