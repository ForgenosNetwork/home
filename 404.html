      'neuroflex-engine':'/braintraining/neuroflex-engine',
      'circadiasync-alignment-engine':'/health/circadiasync-alignment-engine',
      'macroshift-tool':'/health/macroshift-Tool',
      'pranapace-neural-breath-sync':'/health/pranapace-neural-breath-sync',
      'stimcurve-tool':'/health/stimcurve-tool',
      'stressshield-tool':'/health/stressshield-tool'
    };
    var FALLBACK=[
      {keys:['pulse','wealth','vestiq','equity','vesting','runwayzero','runway','subslayer','finance','invest','budget','saving','stock'],folder:'finance'},
      {keys:['tokenforge','jwt','branchweaver','git','regexdrill','regex','schemasynth','schema','deploynexus','deploy','dev','code','api','sandbox'],folder:'dev'},
      {keys:['velocityread','deepwork','ideaharvest','chronoblock','study','learn','read','harvest','weaver'],folder:'studyzone'},
      {keys:['neuropulse','biasbreaker','neuroflex','brain','memory','cognitive','bias','neuro'],folder:'braintraining'},
      {keys:['circadiasync','macroshift','macro','pranapace','prana','breath','stimcurve','stim','stressshield','stress','health','sleep','circadia'],folder:'health'},
      {keys:['image','img','photo','png','jpg','jpeg','compress','resize','crop'],folder:'imagelab'},
      {keys:['pdf','merge','split'],folder:'pdfmagic'}
    ];
    function toSlug(r){try{r=decodeURIComponent(r);}catch(e){}return r.toLowerCase().replace(/^\//,'').replace(/\.html?$/,'').replace(/\/$/,'');}
    var slug=toSlug(window.location.pathname);
    var dest=EXACT_MAP[slug]||null;
    if(!dest){for(var i=0;i<FALLBACK.length;i++){var e=FALLBACK[i];for(var j=0;j<e.keys.length;j++){if(slug.indexOf(e.keys[j])!==-1){dest='/'+e.folder+'/'+slug;break;}}if(dest)break;}}
    if(!dest)dest='/';
    window.location.replace(dest);
  })();
